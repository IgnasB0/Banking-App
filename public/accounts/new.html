<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>New Account — Banking App</title>
  <link rel="stylesheet" href="/app.css">
</head>
<body>
  <nav>
    <a href="/" class="logo">Banking App</a>
    <a href="/">Accounts</a>
    <a href="/accounts/new.html">New Account</a>
    <a href="/transfers/new.html">Transfer</a>
    <button class="btn btn-secondary btn-sm" id="logout-btn">Sign out</button>
  </nav>
  <script type="module">
    import { logout } from '/js/api.js';
    document.getElementById('logout-btn').addEventListener('click', logout);
  </script>
  <main>
    <h1>Create Account</h1>
    <div class="card" style="max-width:440px">
      <form id="account-form">
        <div class="form-group">
          <label>First Name</label>
          <input name="first_name" required placeholder="Jane">
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <input name="last_name" required placeholder="Smith">
        </div>
        <div class="form-group">
          <label>Country Code</label>
          <input name="country_code" required placeholder="GB" maxlength="2" style="text-transform:uppercase">
        </div>
        <button type="submit" class="btn btn-primary">Create Account</button>
      </form>
    </div>
  </main>
  <script type="module" src="/js/accounts_new.js"></script>
</body>
</html>
